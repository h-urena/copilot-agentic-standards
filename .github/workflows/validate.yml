name: Validate Composed Files

on:
  pull_request:
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"

  validate:
    name: Check composed files are fresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/compose.sh scripts/validate-composed.sh

      - name: Validate composed files
        run: ./scripts/validate-composed.sh
