name: Validate Composed Files

on:
  pull_request:
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/**"
      - "mcp/**"
      - ".github/workflows/**"
      - "workflows/**"
      - "templates/**"
  push:
    branches: [main]
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/**"
      - "mcp/**"
      - ".github/workflows/**"
      - "workflows/**"
      - "templates/**"

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository for shellcheck analysis
        uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"

  validate:
    name: Check composed files are fresh
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository with full history for freshness comparison
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/compose.sh scripts/validate-composed.sh

      - name: Ensure composed files match their source instructions
        run: ./scripts/validate-composed.sh

  lint-json:
    name: Validate MCP JSON configs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository to access MCP config files
        uses: actions/checkout@v6

      - name: Validate all MCP JSON files parse correctly
        run: |
          fail=0
          for f in mcp/*.json; do
            if ! jq empty "$f" 2>&1; then
              echo "INVALID: $f" >&2
              fail=1
            else
              echo "OK: $f"
            fi
          done
          exit "$fail"

  lint-yaml:
    name: Validate YAML syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository to access workflow and config files
        uses: actions/checkout@v6

      - name: Set up yamllint for YAML syntax validation
        run: pip install --quiet "yamllint==1.35.1"

      - name: Validate YAML syntax across all workflow and config files
        run: |
          yamllint \
            .github/workflows/ \
            workflows/ \
            templates/dependabot.yml \
            .github/dependabot.yml
