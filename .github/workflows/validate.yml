name: Validate Composed Files

on:
  pull_request:
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/compose.sh"
      - "scripts/validate-composed.sh"
  push:
    branches: [main]
    paths:
      - "instructions/**"
      - "composed/**"
      - "scripts/compose.sh"
      - "scripts/validate-composed.sh"

permissions:
  contents: read

jobs:
  validate:
    name: Check composed files are fresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/compose.sh scripts/validate-composed.sh

      - name: Validate composed files
        run: ./scripts/validate-composed.sh
