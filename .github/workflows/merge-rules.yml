# Merge Rules
#
# Dual-trigger:
#   1. pull_request — runs automatically on PRs in this repo
#   2. workflow_call — consumer repos call this as a reusable workflow:
#
#        jobs:
#          merge-rules:
#            uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@main
#            with:
#              require-linear-history: true
#              commitlint-enabled: true
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets need to be passed.
# The caller must declare: permissions: contents: read, pull-requests: read

name: Merge Rules

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  workflow_call:
    inputs:
      require-linear-history:
        description: "Enforce squash merge (no merge commits)"
        type: boolean
        default: true
      commitlint-enabled:
        description: "Validate PR titles against Conventional Commits"
        type: boolean
        default: true
      branch-check-enabled:
        description: "Enforce issue-linked branch name pattern"
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Validate PR title (Conventional Commits)
    # Always runs on pull_request; on workflow_call, runs unless explicitly disabled
    if: ${{ github.event_name != 'workflow_call' || inputs.commitlint-enabled }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose

  squash-check:
    name: Verify squash merge is enabled
    if: ${{ github.event_name != 'workflow_call' || inputs.require-linear-history }}
    runs-on: ubuntu-latest
    steps:
      - name: Check repository merge settings
        uses: actions/github-script@v9
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Guard against restricted tokens (e.g. Dependabot PRs) that return
            // allow_squash_merge as undefined rather than a boolean. Only hard-fail
            // when the API explicitly returns false.
            if (repo.allow_squash_merge === false) {
              core.setFailed(
                'Squash merge is not enabled. Enable it under Settings → General → Pull Requests.'
              );
              return;
            }

            if (repo.allow_squash_merge === undefined) {
              core.warning(
                'Could not verify squash-merge setting (token may have restricted permissions). ' +
                'Ensure only squash merge is enabled under Settings → General → Pull Requests.'
              );
              return;
            }

            if (repo.allow_merge_commit || repo.allow_rebase_merge) {
              core.warning(
                'Non-squash merge methods are enabled. Disable merge commits and rebase ' +
                'merges to enforce a clean linear history.'
              );
            }

  branch-name:
    name: Validate branch name
    if: ${{ github.event_name != 'workflow_call' || inputs.branch-check-enabled }}
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request?.head?.ref ?? '';

            // Exempt automated bots and long-lived base branches
            const EXEMPT = /^(main|master|develop|staging|release\/|dependabot\/|renovate\/)/;
            if (EXEMPT.test(branch)) {
              core.info(`Branch '${branch}' is exempt from naming checks.`);
              return;
            }

            // Expected: type/ISSUE_NUMBER-short-slug
            // e.g. feat/42-add-oauth-flow  fix/123-null-crash
            const VALID = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|hotfix|bugfix)\/\d+-[a-z0-9][a-z0-9-]*$/;

            if (!VALID.test(branch)) {
              core.setFailed(
                `Branch name '${branch}' does not follow the required convention.\n` +
                `Expected: <type>/<issue-number>-<slug>\n` +
                `Example:  feat/42-add-oauth-flow\n` +
                `Valid types: feat fix docs style refactor perf test build ci chore hotfix bugfix`
              );
            } else {
              core.info(`Branch name '${branch}' is valid.`);
            }
