# Merge Rules
#
# Enforces Conventional Commits on PR titles and squash-merge policy.
# Runs on every PR targeting main.

name: Merge Rules

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose

  squash-check:
    name: Verify squash merge is enabled
    runs-on: ubuntu-latest
    steps:
      - name: Check repository merge settings
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            if (!repo.allow_squash_merge) {
              core.setFailed(
                'Squash merge is not enabled. Enable it under Settings → General → Pull Requests.'
              );
            }

            if (repo.allow_merge_commit || repo.allow_rebase_merge) {
              core.warning(
                'Non-squash merge methods are enabled. Disable merge commits and rebase ' +
                'merges to enforce a clean linear history.'
              );
            }
