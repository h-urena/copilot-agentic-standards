# PR Description Generator
#
# Dual-trigger:
#   1. pull_request — runs automatically on PRs in this repo
#   2. workflow_call — consumer repos call this as a reusable workflow:
#
#        permissions:
#          pull-requests: write
#        jobs:
#          pr-description:
#            uses: h-urena/copilot-agentic-standards/.github/workflows/pr-description.yml@main
#
# What it does:
#   On pull_request opened/synchronize/reopened, reads all commits on the branch,
#   parses them as Conventional Commits, and fills in the PR body using the
#   standard PR template. The body is only written when it is empty, still contains
#   the default template placeholder, or was previously auto-generated by this
#   workflow (detected via the AUTO_MARKER HTML comment).
#
#   A manually edited description (one that no longer contains the marker or the
#   template placeholder) is never overwritten.
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets required.

name: Auto-populate PR Body From Branch Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    inputs:
      pr-number:
        description: "PR number to populate (required when called from another workflow)"
        required: false
        type: number
        default: 0

permissions:
  pull-requests: write

jobs:
  generate:
    name: Ensure PR body is populated before review
    runs-on: ubuntu-latest
    # Skip bot-opened PRs — Dependabot etc. manage their own descriptions
    if: ${{ !endsWith(github.actor, '[bot]') }}

    steps:
      - name: Write PR body from branch Conventional Commits
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            // HTML comment used to identify auto-generated descriptions.
            // Removing it from a description signals "human edited — do not touch".
            const AUTO_MARKER = '<!-- pr-description: auto -->';

            // ── 1. Resolve PR number ──────────────────────────────────────────
            const prNumber =
              context.payload.pull_request?.number ??
              ${{ inputs['pr-number'] || 0 }};
            if (!prNumber) {
              core.setFailed('Could not determine PR number from event payload.');
              return;
            }

            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── 2. Fetch PR metadata ──────────────────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });

            const existingBody   = pr.body ?? '';
            const isAutoGenerated = existingBody.includes(AUTO_MARKER);
            const isEmpty         = existingBody.trim().length === 0;
            // Default template placeholder — present when a contributor opens a
            // PR without filling in the template
            const isDefaultTemplate = existingBody.includes('<!-- What changed and why?');

            if (!isEmpty && !isDefaultTemplate && !isAutoGenerated) {
              core.info('PR description has been manually customized — skipping auto-generation.');
              return;
            }

            // ── 3. Fetch all commits on the PR ────────────────────────────────
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: prNumber, per_page: 100 },
            );

            // ── 4. Extract issue number from branch name ──────────────────────
            // Branch format: <type>/<issue-number>-<slug>  e.g. feat/42-add-oauth
            const issueMatch  = pr.head.ref.match(/\/(\d+)-/);
            const issueNumber = issueMatch ? issueMatch[1] : null;

            // ── 5. Parse Conventional Commits ────────────────────────────────
            const CC_RE = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(([^)]+)\))?: (.+)$/;

            const TYPE_LABELS = {
              feat:     'Features',
              fix:      'Bug Fixes',
              docs:     'Documentation',
              style:    'Style',
              refactor: 'Refactoring',
              perf:     'Performance',
              test:     'Tests',
              build:    'Build',
              ci:       'CI',
              chore:    'Chores',
              revert:   'Reverts',
            };

            const grouped      = {};
            const unclassified = [];
            const types        = new Set();

            for (const { commit } of commits) {
              const subject = commit.message.split('\n')[0].trim();
              // Skip merge commits
              if (subject.startsWith('Merge ')) continue;

              const match = CC_RE.exec(subject);
              if (match) {
                const type  = match[1];
                const scope = match[3] ?? null;
                const desc  = match[4];
                types.add(type);
                if (!grouped[type]) grouped[type] = [];
                grouped[type].push({ scope, desc });
              } else {
                unclassified.push(subject);
              }
            }

            // ── 6. Build "Changes" section ────────────────────────────────────
            let changesSection = '';
            for (const [type, items] of Object.entries(grouped)) {
              const label = TYPE_LABELS[type] ?? type;
              changesSection += `\n**${label}**\n`;
              for (const { scope, desc } of items) {
                changesSection += `- ${scope ? `\`${scope}\` ` : ''}${desc}\n`;
              }
            }
            if (unclassified.length) {
              changesSection += '\n**Other**\n';
              for (const msg of unclassified) {
                changesSection += `- ${msg}\n`;
              }
            }
            if (!changesSection.trim()) changesSection = '\n-\n';

            // ── 7. Determine type-of-change checkboxes ────────────────────────
            const check = t => types.has(t) ? 'x' : ' ';
            const checkRefactor = (types.has('refactor') || types.has('style') || types.has('perf')) ? 'x' : ' ';
            const checkChore    = (types.has('chore') || types.has('build') || types.has('ci'))      ? 'x' : ' ';

            const closesLine = issueNumber ? `\nCloses #${issueNumber}\n` : '\nCloses #\n';

            // ── 8. Compose the final PR body ──────────────────────────────────
            const newBody = [
              AUTO_MARKER,
              '## Description',
              '',
              pr.title + closesLine,
              '## Type of change',
              '',
              `- [${check('feat')}] \`feat\` — New feature`,
              `- [${check('fix')}] \`fix\` — Bug fix`,
              `- [${check('docs')}] \`docs\` — Documentation only`,
              `- [${checkRefactor}] \`refactor\` — Code restructuring (no behavior change)`,
              `- [${check('test')}] \`test\` — Adding or updating tests`,
              `- [${checkChore}] \`chore\` — Maintenance (deps, CI, tooling)`,
              '',
              '## Changes',
              changesSection,
              '## Testing',
              '',
              '- [ ] Unit tests added/updated',
              '- [ ] Integration tests added/updated',
              '- [ ] Manual testing performed',
              '',
              '## Checklist',
              '',
              '- [ ] PR title follows Conventional Commits format',
              '- [ ] Code follows project coding standards',
              '- [ ] Self-review completed',
              '- [ ] Tests pass locally',
              '- [ ] Documentation updated (if applicable)',
              '- [ ] No secrets or credentials committed',
            ].join('\n');

            // ── 9. Update the PR ──────────────────────────────────────────────
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body: newBody,
            });

            core.info(`PR #${prNumber} description generated from ${commits.length} commit(s).`);
