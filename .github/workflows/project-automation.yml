# Project Board Automation
#
# Moves issue cards on the GitHub Project board automatically as work progresses:
#
#   Todo        — issue created (default on board add)
#   In Progress — branch pushed that matches feat|fix|.../ISSUE-slug
#   In Review   — PR opened → repo owner assigned as reviewer
#   Done        — PR approved by the owner OR merged
#
# -- Setup required ------------------------------------------------------------
# Add a repository secret named PR_TOKEN containing a classic PAT
# with the following scope:
#   project   — required for GitHub Projects v2 GraphQL API (addProjectV2ItemById)
#
# NOTE: Fine-grained PATs cannot be used here. The Projects v2 GraphQL API
# requires the `project` scope which is only available on classic PATs for
# personal (non-organisation) accounts.
#
# -- Consumer repo usage -------------------------------------------------------
# jobs:
#   board:
#     uses: h-urena/copilot-agentic-standards/.github/workflows/project-automation.yml@main
#     secrets:
#       PR_TOKEN: ${{ secrets.PR_TOKEN }}
#     with:
#       project-number: 4
#       project-owner: your-github-login
#       repo-owner: your-github-login

name: Project Board Automation

on:
  issues:
    types: [opened, reopened, transferred]
  push:
    branches-ignore: [main, master, develop, staging]
  pull_request:
    types: [opened, reopened, review_requested, closed]
  pull_request_review:
    types: [submitted]
  workflow_call:
    secrets:
      PR_TOKEN:
        required: true
    inputs:
      project-number:
        description: "GitHub Project number (visible in the project URL)"
        required: true
        type: number
      project-owner:
        description: "GitHub login that owns the project (user or org)"
        required: true
        type: string
      repo-owner:
        description: "GitHub login of the repo owner / required reviewer"
        required: true
        type: string

permissions:
  pull-requests: read
  contents: read
  issues: read

jobs:
  # -- Add newly created issue to board as "Todo" ----------------------------
  issue-to-todo:
    name: Issue opened → Todo
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project board as Todo
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PR_TOKEN || github.token }}
          script: |
            if ('${{ secrets.PR_TOKEN }}' === '') {
              core.setFailed(
                'PR_TOKEN secret is not configured. Add a classic PAT with the ' +
                'project scope as a repository secret named PR_TOKEN. ' +
                'See workflow header comment for setup instructions.'
              );
              return;
            }

            const PROJECT_OWNER  = '${{ inputs.project-owner }}' || context.repo.owner;
            const PROJECT_NUMBER = parseInt('${{ inputs.project-number }}' || '4', 10);

            const issue = context.payload.issue;
            const issueNodeId = issue.node_id;

            core.info(`Adding issue #${issue.number} "${issue.title}" to project board as Todo.`);

            // 1. Resolve project ID and Status field
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }`, { login: PROJECT_OWNER, number: PROJECT_NUMBER });

            const project = projectData.user.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            if (!statusField) { core.warning('No Status field found in project.'); return; }

            const todoOption = statusField.options.find(o => o.name === 'Todo');
            if (!todoOption) { core.warning('Status option "Todo" not found.'); return; }

            // 2. Add issue to project
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId contentId: $contentId }) {
                  item { id }
                }
              }`, { projectId: project.id, contentId: issueNodeId });

            const itemId = addResult.addProjectV2ItemById.item.id;

            // 3. Set status to Todo
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }`, {
                projectId: project.id,
                itemId,
                fieldId: statusField.id,
                optionId: todoOption.id,
              });

            core.info(`Issue #${issue.number} added to project board with status "Todo".`);

  # -- Move linked issue to "In Progress" when a branch is pushed ------------
  branch-to-in-progress:
    name: Branch pushed → In Progress
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress
        uses: actions/github-script@v9
        with:
          # Fall back to GITHUB_TOKEN so the action never crashes when the secret is absent.
          # The script itself exits early if PR_TOKEN is not configured.
          github-token: ${{ secrets.PR_TOKEN || github.token }}
          script: |
            if ('${{ secrets.PR_TOKEN }}' === '') {
              core.setFailed(
                'PR_TOKEN secret is not configured. Add a classic PAT with the ' +
                'project scope as a repository secret named PR_TOKEN. ' +
                'See workflow header comment for setup instructions.'
              );
              return;
            }

            const PROJECT_OWNER  = '${{ inputs.project-owner }}' || context.repo.owner;
            const PROJECT_NUMBER = parseInt('${{ inputs.project-number }}' || '4', 10);

            const branch = context.ref.replace('refs/heads/', '');

            // Extract issue number from: feat/42-slug  fix/7-some-thing
            const match = branch.match(/^[a-z]+\/(\d+)-/);
            if (!match) {
              core.info(`Branch '${branch}' has no issue number — skipping.`);
              return;
            }
            const issueNumber = parseInt(match[1], 10);
            core.info(`Detected issue #${issueNumber} from branch '${branch}'.`);

            await moveIssueOnBoard({ issueNumber, statusName: 'In Progress', PROJECT_OWNER, PROJECT_NUMBER });

            async function moveIssueOnBoard({ issueNumber, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const owner = context.repo.owner;
              const repo  = context.repo.repo;

              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              await moveNodeOnBoard({ nodeId: issue.node_id, statusName, PROJECT_OWNER, PROJECT_NUMBER });
              core.info(`Issue #${issueNumber} moved to '${statusName}' on project board.`);
            }

            async function moveNodeOnBoard({ nodeId, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const projectData = await github.graphql(`
                query($login: String!, $number: Int!) {
                  user(login: $login) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }`, { login: PROJECT_OWNER, number: PROJECT_NUMBER });

              const project = projectData.user.projectV2;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              if (!statusField) { core.warning('No Status field found in project.'); return; }

              const option = statusField.options.find(o => o.name === statusName);
              if (!option) { core.warning(`Status option '${statusName}' not found.`); return; }

              let itemId;
              try {
                const addResult = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId contentId: $contentId }) {
                      item { id }
                    }
                  }`, { projectId: project.id, contentId: nodeId });
                itemId = addResult.addProjectV2ItemById.item.id;
              } catch (e) {
                core.warning(`Could not add item to project: ${e.message}`);
                return;
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: option.id,
                });
            }

  # -- Move linked issue to "In Review" when PR is opened --------------------
  pr-to-in-review:
    name: PR opened → In Review
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Request review and move to In Review
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PR_TOKEN || github.token }}
          script: |
            if ('${{ secrets.PR_TOKEN }}' === '') {
              core.setFailed(
                'PR_TOKEN secret is not configured. Add a classic PAT with the ' +
                'project scope as a repository secret named PR_TOKEN. ' +
                'See workflow header comment for setup instructions.'
              );
              return;
            }

            const PROJECT_OWNER  = '${{ inputs.project-owner }}' || context.repo.owner;
            const PROJECT_NUMBER = parseInt('${{ inputs.project-number }}' || '4', 10);
            const REPO_OWNER     = '${{ inputs.repo-owner }}' || context.repo.owner;

            const pr       = context.payload.pull_request;
            const prNumber = pr.number;
            const prAuthor = pr.user.login;
            const body     = pr.body ?? '';
            const branch   = pr.head.ref;

            // Request review from repo owner if they're not the author
            if (prAuthor !== REPO_OWNER) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: prNumber,
                  reviewers: [REPO_OWNER],
                });
                core.info(`Review requested from ${REPO_OWNER}.`);
              } catch (err) {
                core.warning(`Could not request review from ${REPO_OWNER}: ${err.message}`);
              }
            }

            // Extract linked issue numbers
            const issueNumbers = extractLinkedIssues(body, branch);
            core.info(`Linked issues: ${issueNumbers.join(', ') || 'none'}`);

            if (issueNumbers.length > 0) {
              for (const issueNumber of issueNumbers) {
                await moveIssueOnBoard({ issueNumber, statusName: 'In Review', PROJECT_OWNER, PROJECT_NUMBER });
              }
            } else {
              // No linked issue — PR opened by a bot (Dependabot, Renovate, automation) or
              // a human who forgot to link one. Add the PR itself as a board item in In Review.
              core.info(`No linked issues found — adding PR #${prNumber} itself to board as In Review.`);
              await movePrOnBoard({ prNodeId: pr.node_id, statusName: 'In Review', PROJECT_OWNER, PROJECT_NUMBER });
            }

            function extractLinkedIssues(body, branch) {
              const nums = new Set();
              // PR body: Closes/Fixes/Resolves #N
              const bodyMatches = body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi);
              for (const m of bodyMatches) nums.add(parseInt(m[1], 10));
              // Branch name: feat/42-slug
              const branchMatch = branch.match(/^[a-z]+\/(\d+)-/);
              if (branchMatch) nums.add(parseInt(branchMatch[1], 10));
              return [...nums];
            }

            async function movePrOnBoard({ prNodeId, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const projectData = await github.graphql(`
                query($login: String!, $number: Int!) {
                  user(login: $login) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }`, { login: PROJECT_OWNER, number: PROJECT_NUMBER });

              const project = projectData.user.projectV2;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              if (!statusField) { core.warning('No Status field found in project.'); return; }
              const option = statusField.options.find(o => o.name === statusName);
              if (!option) { core.warning(`Status option '${statusName}' not found.`); return; }

              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId contentId: $contentId }) {
                    item { id }
                  }
                }`, { projectId: project.id, contentId: prNodeId });

              const itemId = addResult.addProjectV2ItemById.item.id;
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`, { projectId: project.id, itemId, fieldId: statusField.id, optionId: option.id });

              core.info(`PR added to board with status '${statusName}'.`);
            }

            async function moveIssueOnBoard({ issueNumber, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const owner = context.repo.owner;
              const repo  = context.repo.repo;
              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              await movePrOnBoard({ prNodeId: issue.node_id, statusName, PROJECT_OWNER, PROJECT_NUMBER });
              core.info(`Issue #${issueNumber} moved to '${statusName}' on project board.`);
            }

  # -- Move linked issue to "Done" when PR is approved or merged ---------------
  approval-to-done:
    name: PR approved/merged → Done
    if: >
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved') ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for enablePullRequestAutoMerge
      pull-requests: write # required for enablePullRequestAutoMerge
      issues: read
    steps:
      - name: Move linked issues to Done
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PR_TOKEN || github.token }}
          script: |
            if ('${{ secrets.PR_TOKEN }}' === '') {
              core.setFailed(
                'PR_TOKEN secret is not configured. Add a classic PAT with the ' +
                'project scope as a repository secret named PR_TOKEN. ' +
                'See workflow header comment for setup instructions.'
              );
              return;
            }

            const PROJECT_OWNER  = '${{ inputs.project-owner }}' || context.repo.owner;
            const PROJECT_NUMBER = parseInt('${{ inputs.project-number }}' || '4', 10);

            const body   = context.payload.pull_request.body ?? '';
            const branch = context.payload.pull_request.head.ref;
            const prNodeId = context.payload.pull_request.node_id;
            const issueNumbers = extractLinkedIssues(body, branch);
            core.info(`Linked issues: ${issueNumbers.join(', ') || 'none'}`);

            if (issueNumbers.length > 0) {
              for (const issueNumber of issueNumbers) {
                await moveIssueOnBoard({ issueNumber, statusName: 'Done', PROJECT_OWNER, PROJECT_NUMBER });
              }
            } else {
              // No linked issue — move the PR item itself to Done (covers bot PRs)
              core.info('No linked issues — moving PR itself to Done.');
              await moveNodeOnBoard({ nodeId: prNodeId, statusName: 'Done', PROJECT_OWNER, PROJECT_NUMBER });
            }

            function extractLinkedIssues(body, branch) {
              const nums = new Set();
              const bodyMatches = body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi);
              for (const m of bodyMatches) nums.add(parseInt(m[1], 10));
              const branchMatch = branch.match(/^[a-z]+\/(\d+)-/);
              if (branchMatch) nums.add(parseInt(branchMatch[1], 10));
              return [...nums];
            }

            async function moveIssueOnBoard({ issueNumber, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const owner = context.repo.owner;
              const repo  = context.repo.repo;
              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              await moveNodeOnBoard({ nodeId: issue.node_id, statusName, PROJECT_OWNER, PROJECT_NUMBER });
              core.info(`Issue #${issueNumber} moved to '${statusName}' on project board.`);
            }

            async function moveNodeOnBoard({ nodeId, statusName, PROJECT_OWNER, PROJECT_NUMBER }) {
              const projectData = await github.graphql(`
                query($login: String!, $number: Int!) {
                  user(login: $login) {
                    projectV2(number: $number) {
                      id
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }`, { login: PROJECT_OWNER, number: PROJECT_NUMBER });

              const project = projectData.user.projectV2;
              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              if (!statusField) { core.warning('No Status field found in project.'); return; }

              const option = statusField.options.find(o => o.name === statusName);
              if (!option) { core.warning(`Status option '${statusName}' not found.`); return; }

              let itemId;
              try {
                const addResult = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId contentId: $contentId }) {
                      item { id }
                    }
                  }`, { projectId: project.id, contentId: nodeId });
                itemId = addResult.addProjectV2ItemById.item.id;
              } catch (e) {
                core.warning(`Could not add item to project: ${e.message}`);
                return;
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: option.id,
                });
            }

      # Enable squash auto-merge using GITHUB_TOKEN (not PR_TOKEN — requires contents:write).
      # Only arms auto-merge on the PR; GitHub fires the actual merge once all required
      # status checks pass. Skipped on the pull_request:closed safety-net trigger.
      - name: Enable squash auto-merge
        if: github.event_name == 'pull_request_review'
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.node_id) return;
            try {
              await github.graphql(`
                mutation($prId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $prId
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }`, { prId: pr.node_id });
              core.info(`Squash auto-merge enabled for PR #${pr.number} — will merge once required checks pass.`);
            } catch (err) {
              core.warning(`Could not enable auto-merge: ${err.message}`);
            }
