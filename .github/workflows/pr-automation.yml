# Auto-assign PRs, apply labels, and welcome contributors
#
# Dual-trigger:
#   1. pull_request — runs automatically on PRs in this repo
#   2. workflow_call — consumer repos call this as a reusable workflow:
#
#        permissions:
#          pull-requests: write
#          issues: write
#        jobs:
#          pr-automation:
#            uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
#            with:
#              auto-assign-author: true
#              enable-labeler: false
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets need to be passed.
# IMPORTANT: GITHUB_TOKEN cannot trigger subsequent workflow runs. If you need
# the auto-created "update standards" PRs to trigger CI, use a fine-grained PAT
# or GitHub App token in pull-standards.yml instead.

name: Auto-assign PRs, apply labels, and welcome contributors

on:
  pull_request:
    types: [opened, reopened]
  workflow_call:
    inputs:
      auto-assign-author:
        description: "Assign the PR author as the assignee (repo owner is used for bot-authored PRs)"
        type: boolean
        default: true
      repo-owner:
        description: "GitHub login of the repo owner — assigned as responsible when a bot opens a PR"
        type: string
        default: ""
      enable-labeler:
        description: "Apply path-based labels via .github/labeler.yml"
        type: boolean
        default: true

permissions:
  pull-requests: write
  issues: write

jobs:
  auto-assign:
    name: Enforce PR auto-assigned to its author
    if: ${{ github.event_name != 'workflow_call' || inputs.auto-assign-author }}
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign PR to its author
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          INPUT_REPO_OWNER: ${{ inputs.repo-owner }}
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            const author = pr.user.login;
            const isBot = author.endsWith('[bot]') || pr.user.type === 'Bot';

            // When a bot (Copilot, Dependabot, github-actions[bot], etc.) opens the PR,
            // assign the repo owner as the responsible human instead of the bot login.
            const repoOwner = process.env.INPUT_REPO_OWNER || context.repo.owner;
            const assignee = isBot ? repoOwner : author;

            core.info(`PR author: ${author} (bot: ${isBot}) → assigning: ${assignee}`);

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [assignee],
            });

  label:
    name: Enforce path-based label classification
    # Runs on direct pull_request events always; on workflow_call only when enable-labeler is true
    if: ${{ github.event_name != 'workflow_call' || inputs.enable-labeler == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository for label config access
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Apply path-based labels from labeler.yml
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213  # v6.1.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  welcome-comment:
    name: Enforce first-contribution welcome comment
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment on first PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            // Use search API to count all PRs by this author in this repo
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr author:${pr.user.login}`,
            });

            if (data.total_count === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Thanks for your first PR @${pr.user.login}! A maintainer will review it shortly.`,
              });
            }
