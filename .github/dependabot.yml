version: 2

updates:
  # Keep GitHub Actions up to date automatically.
  # Opens a weekly PR when any action has a new major/minor version.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "chore"
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
