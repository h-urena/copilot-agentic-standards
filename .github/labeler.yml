# Labeler configuration for pr-automation and issue-labeler workflows.
# Maps file path patterns to PR labels (consumed by actions/labeler on PRs).
# Issue title patterns are handled separately in issue-labeler.yml.
# See: https://github.com/actions/labeler
#
# To add a new stack:
#   1. Add a block under "Stack labels" with the relevant file extensions / lock files.
#   2. Add the same label name to the issue-labeler.yml STACK_MAP constant.

# ── Stack labels ──────────────────────────────────────────────────────────────
typescript:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.ts"
          - "**/*.tsx"
          - "**/*.js"
          - "**/*.jsx"
          - "package.json"
          - "tsconfig*.json"

python:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.py"
          - "pyproject.toml"
          - "poetry.lock"
          - "uv.lock"
          - "requirements*.txt"

csharp:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.cs"
          - "**/*.csproj"
          - "**/*.sln"
          - "Directory.Build.props"

# ── Layer labels ──────────────────────────────────────────────────────────────
api:
  - changed-files:
      - any-glob-to-any-file:
          - "src/api/**"
          - "src/routes/**"
          - "src/controllers/**"
          - "**/Controllers/**"

database:
  - changed-files:
      - any-glob-to-any-file:
          - "**/migrations/**"
          - "**/models/**"
          - "prisma/**"
          - "alembic/**"
          - "**/Data/**"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/pages/**"
          - "src/app/**"
          - "**/*.css"
          - "**/*.scss"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "**/*.test.*"
          - "**/*.spec.*"
          - "e2e/**"

# ── Concern labels ────────────────────────────────────────────────────────────
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "Dockerfile*"
          - "docker-compose*.yml"
          - ".dockerignore"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package-lock.json"
          - "poetry.lock"
          - "uv.lock"
          - "*.csproj"
          - "requirements*.txt"

config:
  - changed-files:
      - any-glob-to-any-file:
          - ".editorconfig"
          - ".eslintrc*"
          - ".prettierrc*"
          - "tsconfig*.json"
          - "pyproject.toml"
          - "ruff.toml"
          - ".vscode/**"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "**/auth/**"
          - "**/middleware/auth*"
          - "**/security/**"
          - "**/credentials/**"
