version: 2

updates:
  # Keep GitHub Actions up to date automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "chore"
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

