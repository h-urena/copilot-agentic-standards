# CI pipeline template for C# / .NET projects.
# Copy to .github/workflows/ci.yml in your project.
#
# NOTE: The reusable workflow references below point to h-urena/copilot-agentic-standards.
# If you have forked or mirrored the standards repo, update the org/repo in every `uses:` line.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Governance checks (reusable from standards repo) ──
  merge-rules:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@main
    permissions:
      contents: read
      pull-requests: read

  pr-description:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-description.yml@main
    permissions:
      pull-requests: write

  pr-automation:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
    permissions:
      contents: read
      pull-requests: write
      issues: write
    with:
      enable-labeler: true

  code-review:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/code-review.yml@main
    permissions:
      contents: read
      pull-requests: write

  # ── Build & Lint ──
  build:
    name: Application compiles with zero warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Compile with zero-warning policy
        run: dotnet build --no-restore -warnaserror

  # ── Unit tests ──
  test-unit:
    name: Unit tests pass
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Run unit tests with coverage
        run: >
          dotnet test --no-restore
          --filter "Category!=Integration"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Persist coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-unit
          path: coverage/

  # ── Integration tests ──
  test-integration:
    name: Integration tests pass
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Run integration test suite
        run: dotnet test --no-restore --filter "Category=Integration"

  # ── Publish ──
  publish:
    name: Release artifact published
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "9.0.x"

      - name: Publish release build
        run: dotnet publish src/Api/Api.csproj -c Release -o publish

      - name: Persist publish artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: publish
          path: publish/

