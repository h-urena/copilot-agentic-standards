# CI pipeline template for Python projects.
# Copy to .github/workflows/ci.yml in your project.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Governance checks (reusable from standards repo) ──
  merge-rules:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@main
    permissions:
      contents: read
      pull-requests: read

  pr-description:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-description.yml@main
    permissions:
      pull-requests: write

  pr-automation:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
    permissions:
      contents: read
      pull-requests: write
      issues: write
    with:
      enable-labeler: true

  code-review:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/code-review.yml@main
    permissions:
      contents: read
      pull-requests: write

  # ── Lint & Type Check ──
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy --strict .

  # ── Unit tests ──
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit -v --cov --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml

  # ── Integration tests ──
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest tests/integration -v

  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

