# CI pipeline template for TypeScript projects.
# Copy to .github/workflows/ci.yml in your project.
#
# NOTE: The reusable workflow references below point to h-urena/copilot-agentic-standards.
# If you have forked or mirrored the standards repo, update the org/repo in every `uses:` line.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Governance checks (reusable from standards repo) ──
  merge-rules:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@main
    permissions:
      contents: read
      pull-requests: read

  pr-description:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-description.yml@main
    permissions:
      pull-requests: write

  pr-automation:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
    permissions:
      contents: read
      pull-requests: write
      issues: write
    with:
      enable-labeler: true

  code-review:
    if: github.event_name == 'pull_request'
    uses: h-urena/copilot-agentic-standards/.github/workflows/code-review.yml@main
    permissions:
      contents: read
      pull-requests: write

  # ── Lint ──
  lint:
    name: Enforce code style and type safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Enforce zero ESLint warnings
        run: npx eslint . --max-warnings 0

      - name: Enforce TypeScript type safety
        run: npx tsc --noEmit

  # ── Unit tests ──
  test-unit:
    name: Unit tests pass
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Persist coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-unit
          path: coverage/

  # ── Integration tests ──
  test-integration:
    name: Integration tests pass
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run integration test suite
        run: npx vitest run --config vitest.integration.config.ts

  # ── Build ──
  build:
    name: Application compiles and packages
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Compile and bundle
        run: npm run build

      - name: Persist build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

