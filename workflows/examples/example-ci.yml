# Example CI — Caller Workflow
#
# This file shows how a consumer repo calls the reusable workflows
# from copilot-agentic-standards. Copy this to your repo as
# .github/workflows/ci.yml and adjust as needed.

name: CI

on:
  pull_request:
    branches: [main]

# Grant minimum permissions needed by the reusable workflows.
# GITHUB_TOKEN is used automatically — no secrets need to be configured.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  merge-rules:
    name: Merge Rules
    uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@86c5acf98f7f2aa66b66f5f728de4f290c3160b0  # main
    with:
      require-linear-history: true
      commitlint-enabled: true

  pr-automation:
    name: PR Automation
    uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@86c5acf98f7f2aa66b66f5f728de4f290c3160b0  # main
    with:
      auto-assign-author: true
      enable-labeler: false # set to true once you add .github/labeler.yml

