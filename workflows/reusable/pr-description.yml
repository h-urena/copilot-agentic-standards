# PR Description Generator — Reusable Workflow
#
# This file is a documentation reference. The ACTUAL callable reusable workflow is:
#   .github/workflows/pr-description.yml
#
# That file supports both pull_request (for this repo) and workflow_call (for consumers).
# Consumer repos call it as:
#
#   permissions:
#     pull-requests: write
#   jobs:
#     pr-description:
#       uses: h-urena/copilot-agentic-standards/.github/workflows/pr-description.yml@main
#       with:
#         pr-number: ${{ github.event.pull_request.number }}
#
# What it does:
#   Reads all commits on the PR branch, parses Conventional Commits, and fills in
#   the PR body. The auto-generated body is only written when the PR body is empty,
#   still matches the default template placeholder, or was previously auto-generated
#   (detected via the <!-- pr-description: auto --> HTML comment).
#
#   Removing that comment from a description signals "human edited — do not touch".
#
# Authentication: uses GITHUB_TOKEN. No secrets required.

name: Auto-populate PR Body From Branch Commits

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number to populate (required when called from another workflow)"
        required: false
        type: number
        default: 0

permissions:
  pull-requests: write

jobs:
  generate:
    name: Ensure PR body is populated before review
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Write PR body from branch Conventional Commits
