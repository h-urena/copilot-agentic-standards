# Merge Rules — Reusable Workflow
#
# This file is a documentation reference. The ACTUAL callable reusable workflow is:
#   .github/workflows/merge-rules.yml
#
# That file supports both pull_request (for this repo) and workflow_call (for consumers).
# Consumer repos call it as:
#
#   jobs:
#     merge-rules:
#       uses: h-urena/copilot-agentic-standards/.github/workflows/merge-rules.yml@main
#       with:
#         require-linear-history: true
#         commitlint-enabled: true
#         branch-check-enabled: true
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets need to be passed.
# The caller must declare: permissions: contents: read, pull-requests: read

name: Merge Rules

on:
  workflow_call:
    inputs:
      require-linear-history:
        description: "Enforce squash or rebase merge (no merge commits)"
        type: boolean
        default: true
      commitlint-enabled:
        description: "Validate commit/PR titles against Conventional Commits"
        type: boolean
        default: true

jobs:
  commitlint:
    name: Validate PR title
    if: ${{ inputs.commitlint-enabled }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/{cli,config-conventional}
          echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint --verbose

  squash-check:
    name: Enforce squash merge
    if: ${{ inputs.require-linear-history }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check merge method
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            if (!repo.allow_squash_merge) {
              core.setFailed(
                'Squash merge is not enabled. Enable it under Settings → General → Pull Requests.'
              );
            }

            if (repo.allow_merge_commit || repo.allow_rebase_merge) {
              core.warning(
                'Non-squash merge methods are enabled. Disable merge commits and rebase ' +
                'merges to enforce a clean linear history.'
              );
            }
