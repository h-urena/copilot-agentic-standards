# PR Automation — Reusable Workflow
#
# This file is a documentation reference. The ACTUAL callable reusable workflow is:
#   .github/workflows/pr-automation.yml
#
# That file supports both pull_request (for this repo) and workflow_call (for consumers).
# Consumer repos call it as:
#
#   permissions:
#     pull-requests: write
#     issues: write
#   jobs:
#     pr-automation:
#       uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
#       with:
#         auto-assign-author: true
#         enable-labeler: false  # set true once .github/labeler.yml exists
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets need to be passed.

name: Auto-assign PRs, apply labels, and welcome contributors

on:
  workflow_call:
    inputs:
      auto-assign-author:
        description: "Assign the PR author as the assignee"
        type: boolean
        default: true
      enable-labeler:
        description: "Apply path-based labels via .github/labeler.yml"
        type: boolean
        default: false

jobs:
  auto-assign:
    name: Enforce PR auto-assigned to its author
    if: ${{ inputs.auto-assign-author }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Auto-assign PR to its author
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [pr.user.login],
            });

  label:
    name: Enforce path-based label classification
    if: ${{ inputs.enable-labeler }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository for label config access
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Apply path-based labels from labeler.yml
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b  # v6.0.1
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  welcome-comment:
    name: Enforce first-contribution welcome comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post welcome comment on first PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            // Use search API to reliably count PRs by this author
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr author:${pr.user.login}`,
            });

            if (data.total_count === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Thanks for your first PR @${pr.user.login}! A maintainer will review it shortly.`,
              });
            }
