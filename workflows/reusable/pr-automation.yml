# PR Automation — Reusable Workflow
#
# This file is a documentation reference. The ACTUAL callable reusable workflow is:
#   .github/workflows/pr-automation.yml
#
# That file supports both pull_request (for this repo) and workflow_call (for consumers).
# Consumer repos call it as:
#
#   permissions:
#     pull-requests: write
#     issues: write
#   jobs:
#     pr-automation:
#       uses: h-urena/copilot-agentic-standards/.github/workflows/pr-automation.yml@main
#       with:
#         auto-assign-author: true
#         enable-labeler: false  # set true once .github/labeler.yml exists
#
# Authentication: uses GITHUB_TOKEN automatically. No secrets need to be passed.

name: PR Automation

on:
  workflow_call:
    inputs:
      auto-assign-author:
        description: "Assign the PR author as the assignee"
        type: boolean
        default: true
      enable-labeler:
        description: "Apply path-based labels via .github/labeler.yml"
        type: boolean
        default: false

jobs:
  auto-assign:
    name: Assign PR to author
    if: ${{ inputs.auto-assign-author }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Assign author as assignee
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [pr.user.login],
            });

  label:
    name: Apply path-based labels
    if: ${{ inputs.enable-labeler }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  welcome-comment:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post welcome comment on first PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.user?.login) return;

            // Use search API to reliably count PRs by this author
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr author:${pr.user.login}`,
            });

            if (data.total_count === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Thanks for your first PR @${pr.user.login}! A maintainer will review it shortly.`,
              });
            }
