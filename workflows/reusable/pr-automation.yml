# PR Automation — Reusable Workflow
#
# Auto-assign reviewers, apply labels based on paths, add a welcome comment.
# Consumer repos call this via workflow_call.

name: PR Automation

on:
  workflow_call:
    inputs:
      auto-assign-author:
        description: "Assign the PR author as the assignee"
        type: boolean
        default: true
      label-config:
        description: "JSON mapping of glob patterns to labels"
        type: string
        default: '{}'
    secrets:
      github-token:
        description: "GitHub token with PR write permissions"
        required: true

jobs:
  auto-assign:
    name: Auto-assign author
    if: ${{ inputs.auto-assign-author }}
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.github-token }}
          script: |
            const pr = context.payload.pull_request;
            if (pr && pr.user.login) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [pr.user.login],
              });
            }

  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.github-token }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  welcome-comment:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    steps:
      - name: Check and welcome
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.github-token }}
          script: |
            const pr = context.payload.pull_request;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: pr.user.login,
            });

            if (prs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Welcome @${pr.user.login}! 👋 Thanks for your first contribution. A maintainer will review your PR shortly.`,
              });
            }
