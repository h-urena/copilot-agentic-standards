# Pull Standards — Sync Workflow
#
# Runs weekly (or on-demand) in consumer repos. Checks for updates
# in copilot-agentic-standards and opens a PR if the local copy is outdated.
#
# Copy this file to your repo: .github/workflows/pull-standards.yml

name: Sync Agentic Standards From Upstream on Schedule

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

env:
  STANDARDS_REPO: h-urena/copilot-agentic-standards
  STANDARDS_BRANCH: main
  UPDATE_BRANCH: chore/update-standards

jobs:
  sync:
    name: Detect and apply upstream standards updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo at full depth for git operations
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed standards assets and copy to workspace
        run: |
          set -euo pipefail

          # Clone the standards repo into a temp directory
          TEMP_DIR=$(mktemp -d)
          git clone --depth 1 --branch "$STANDARDS_BRANCH" \
            "https://github.com/${STANDARDS_REPO}.git" "$TEMP_DIR"

          # Detect stack from existing copilot-instructions.md header
          STACK=""
          if [ -f .github/copilot-instructions.md ]; then
            STACK=$(head -5 .github/copilot-instructions.md | grep -oP '(?<=Stack: )\w+' || true)
          fi

          CHANGED=false

          # Update copilot-instructions.md if a composed file exists for this stack
          if [ -n "$STACK" ] && [ -f "$TEMP_DIR/composed/${STACK}-copilot-instructions.md" ]; then
            src="$TEMP_DIR/composed/${STACK}-copilot-instructions.md"
            if ! diff -q ".github/copilot-instructions.md" "$src" > /dev/null 2>&1; then
              cp "$src" .github/copilot-instructions.md
              CHANGED=true
            fi
          fi

          # Update code review instructions if present
          if [ -f "$TEMP_DIR/instructions/code-review.instructions.md" ]; then
            mkdir -p .github
            src="$TEMP_DIR/instructions/code-review.instructions.md"
            if ! diff -q ".github/code-review.instructions.md" "$src" > /dev/null 2>&1; then
              cp "$src" .github/code-review.instructions.md
              CHANGED=true
            fi
          fi

          # Update stack-specific code review instructions if present
          if [ -n "$STACK" ] && \
             [ -f "$TEMP_DIR/instructions/code-review-${STACK}.instructions.md" ]; then
            mkdir -p .github
            src="$TEMP_DIR/instructions/code-review-${STACK}.instructions.md"
            dst=".github/code-review-${STACK}.instructions.md"
            if ! diff -q "$dst" "$src" > /dev/null 2>&1; then
              cp "$src" "$dst"
              CHANGED=true
            fi
          fi

          # Update PR templates
          if [ -d "$TEMP_DIR/templates/pull-request" ]; then
            mkdir -p .github/PULL_REQUEST_TEMPLATE
            for tmpl in "$TEMP_DIR"/templates/pull-request/*.md; do
              fname=$(basename "$tmpl")
              if ! diff -q ".github/PULL_REQUEST_TEMPLATE/$fname" "$tmpl" > /dev/null 2>&1; then
                cp "$tmpl" ".github/PULL_REQUEST_TEMPLATE/$fname"
                CHANGED=true
              fi
            done
          fi

          # Update MCP config (.vscode/mcp.json) from the composed stack file
          if [ -n "$STACK" ] && [ -f "$TEMP_DIR/composed/${STACK}.mcp.json" ]; then
            if ! diff -q ".vscode/mcp.json" "$TEMP_DIR/composed/${STACK}.mcp.json" > /dev/null 2>&1; then
              mkdir -p .vscode
              cp "$TEMP_DIR/composed/${STACK}.mcp.json" .vscode/mcp.json
              CHANGED=true
            fi
          fi

          # Update all prompt subdirectories (.github/prompts/*/*.prompt.md)
          # Generic loop — picks up any new subdirectory added to the standards repo
          # automatically (matches onboard-repo.sh step 7).
          if [ -d "$TEMP_DIR/.github/prompts" ]; then
            for prompt_dir in "$TEMP_DIR/.github/prompts"/*/; do
              [ -d "$prompt_dir" ] || continue
              subdir=$(basename "$prompt_dir")
              mkdir -p ".github/prompts/$subdir"
              for prompt in "$prompt_dir"*.prompt.md; do
                [ -f "$prompt" ] || continue
                fname=$(basename "$prompt")
                if ! diff -q ".github/prompts/$subdir/$fname" "$prompt" > /dev/null 2>&1; then
                  cp "$prompt" ".github/prompts/$subdir/$fname"
                  CHANGED=true
                fi
              done
            done
          fi

          # Update Copilot Skill files (.github/skills/*.skill.md)
          if [ -d "$TEMP_DIR/skills" ]; then
            mkdir -p .github/skills
            for skill in "$TEMP_DIR/skills"/*.skill.md; do
              [ -f "$skill" ] || continue
              fname=$(basename "$skill")
              if ! diff -q ".github/skills/$fname" "$skill" > /dev/null 2>&1; then
                cp "$skill" ".github/skills/$fname"
                CHANGED=true
              fi
            done
          fi

          # Update all distributable agentic workflows (.github/workflows/*.yml)
          # Generic loop — mirrors onboard-repo.sh step 5.
          # Excludes validate.yml (internal to standards repo) and pull-standards.yml itself
          # (consumer repos may customise their sync schedule).
          if [ -d "$TEMP_DIR/.github/workflows" ]; then
            mkdir -p .github/workflows
            for wf in "$TEMP_DIR/.github/workflows"/*.yml; do
              [ -f "$wf" ] || continue
              wf_name=$(basename "$wf")
              case "$wf_name" in
                validate.yml|pull-standards.yml) continue ;;
              esac
              if ! diff -q ".github/workflows/$wf_name" "$wf" > /dev/null 2>&1; then
                cp "$wf" ".github/workflows/$wf_name"
                CHANGED=true
              fi
            done
          fi

          # Update domain instruction files (.github/*.instructions.md),
          # skipping code-review files already handled above
          for instr_file in "$TEMP_DIR/instructions/"*.instructions.md; do
            [ -f "$instr_file" ] || continue
            fname=$(basename "$instr_file")
            case "$fname" in code-review*.instructions.md) continue ;; esac
            mkdir -p .github
            if ! diff -q ".github/$fname" "$instr_file" > /dev/null 2>&1; then
              cp "$instr_file" ".github/$fname"
              CHANGED=true
            fi
          done

          # Apply runtime version bumps from versions.json to consumer repo CI/Docker files.
          # This ensures that when bump-runtime-versions.yml updates the standards repo,
          # the new versions trickle down to all consumer repos on their next weekly sync.
          if [ -f "$TEMP_DIR/versions.json" ]; then
            PY_NEW=$(jq -r '.python' "$TEMP_DIR/versions.json")
            NODE_NEW=$(jq -r '.node' "$TEMP_DIR/versions.json")
            DOTNET_NEW=$(jq -r '.dotnet' "$TEMP_DIR/versions.json")

            # Files to patch in the consumer repo (non-exhaustive; covers the standard layout)
            CI_YML=".github/workflows/ci.yml"

            if [ -f "$CI_YML" ]; then
              BEFORE=$(md5sum "$CI_YML")
              sed -i -E \
                -e "s/python-version: \"[0-9]+\.[0-9]+\"/python-version: \"${PY_NEW}\"/g" \
                -e "s/node-version: \"[0-9]+\"/node-version: \"${NODE_NEW}\"/g" \
                -e "s/node-version: [0-9]+$/node-version: ${NODE_NEW}/g" \
                -e "s/dotnet-version: \"[0-9]+\.[0-9]+\.x\"/dotnet-version: \"${DOTNET_NEW}.x\"/g" \
                "$CI_YML"
              AFTER=$(md5sum "$CI_YML")
              if [ "$BEFORE" != "$AFTER" ]; then CHANGED=true; fi
            fi

            # Apply to any Dockerfile found within the first three directory levels
            while IFS= read -r -d '' dockerfile; do
              BEFORE=$(md5sum "$dockerfile")
              sed -i -E \
                -e "s|FROM python:[0-9]+\.[0-9]+-slim|FROM python:${PY_NEW}-slim|g" \
                -e "s|FROM node:[0-9]+-alpine|FROM node:${NODE_NEW}-alpine|g" \
                -e "s|dotnet/sdk:[0-9]+\.[0-9]+-alpine|dotnet/sdk:${DOTNET_NEW}-alpine|g" \
                -e "s|dotnet/aspnet:[0-9]+\.[0-9]+-alpine|dotnet/aspnet:${DOTNET_NEW}-alpine|g" \
                "$dockerfile"
              AFTER=$(md5sum "$dockerfile")
              if [ "$BEFORE" != "$AFTER" ]; then CHANGED=true; fi
            done < <(find . -maxdepth 3 \( -name "Dockerfile" -o -name "Dockerfile.*" \) \
                       -not -path "./.git/*" -print0)
          fi

          rm -rf "$TEMP_DIR"

          echo "changed=$CHANGED" >> "$GITHUB_ENV"

      - name: Commit standards updates to dedicated sync branch
        if: env.changed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$UPDATE_BRANCH"
          git add -A
          git commit -m "chore: update agentic standards from upstream"
          git push --force origin "$UPDATE_BRANCH"

      - name: Open PR to deliver standards updates (idempotent)
        if: env.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${process.env.UPDATE_BRANCH}`,
              state: 'open',
            });

            if (prs.length === 0) {
              const repo = `https://github.com/${process.env.STANDARDS_REPO}`;
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore: update agentic standards from upstream',
                body: `Automated PR — syncs Copilot instructions, PR templates, ` +
                  `code-review checklists, MCP config, agent prompts, ` +
                  `domain instruction files, and pinned runtime versions ` +
                  `(Python / Node.js / .NET) from [copilot-agentic-standards](${repo}).`,
                head: process.env.UPDATE_BRANCH,
                base: 'main',
              });
            }
